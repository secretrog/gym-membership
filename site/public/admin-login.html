<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iron Pulse - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 255, 0, 0.1);
        }

        input::placeholder {
            color: #6b7280 !important;
            opacity: 0.6 !important;
        }

        input {
            position: relative;
            z-index: 1;
            color: #ffffff;
            caret-color: #D4FF00;
        }

        /* Prevent icon text from overflowing into input */
        .material-symbols-outlined {
            width: 24px;
            height: 24px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4ff00">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body class="bg-[#121212] flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <!-- Decorative Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] left-[-10%] size-[400px] bg-[#D4FF00]/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] size-[400px] bg-[#D4FF00]/5 rounded-full blur-[120px]"></div>
    </div>

    <!-- Top Navigation -->
    <header
        class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between px-6 md:px-10 py-4 bg-background-dark/50 backdrop-blur-md">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="bg-primary p-1.5 rounded-sm flex items-center justify-center">
                <span class="material-symbols-outlined text-background-dark font-bold text-xl">fitness_center</span>
            </div>
            <h2 class="text-slate-100 text-xl font-black tracking-tighter uppercase italic md:text-3xl">PREMIUM<span
                    class="text-primary">GYM</span></h2>
        </a>
    </header>

    <div class="w-full max-w-md relative z-10">
        <div class="flex flex-col items-center mb-10 text-center">
            <span class="material-symbols-outlined text-[#D4FF00] text-6xl mb-4">admin_panel_settings</span>
            <h1 class="text-3xl font-black tracking-tighter italic uppercase text-white">Admin<span
                    class="text-[#D4FF00]">Login</span></h1>
            <p class="text-slate-400 mt-2 font-medium tracking-wide">Manage your gym ecosystem</p>
        </div>

        <div class="glass-card p-8 rounded-2xl border border-white/5 shadow-2xl">
            <form id="adminLoginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 px-1">Admin
                        Email</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#D4FF00] transition-colors">person</span>
                        <input type="email" id="email" placeholder="admin@premiumgym.com" required
                            class="w-full bg-[#121212]/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:border-[#D4FF00] focus:ring-1 focus:ring-[#D4FF00] outline-none transition-all text-white font-bold" />
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 px-1">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#D4FF00] transition-colors">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full bg-[#121212]/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:border-[#D4FF00] focus:ring-1 focus:ring-[#D4FF00] outline-none transition-all text-white font-bold tracking-widest" />
                    </div>
                </div>

                <div id="errorMessage"
                    class="hidden text-red-500 text-xs font-bold bg-red-500/10 p-4 rounded-xl text-center">
                    Invalid admin credentials
                </div>

                <button type="submit"
                    class="w-full bg-[#D4FF00] text-[#121212] py-4 rounded-xl font-black uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(212,255,0,0.2)]">
                    Access Dashboard
                </button>
            </form>
        </div>

        <a href="index.html"
            class="flex items-center justify-center gap-2 mt-8 text-slate-500 hover:text-white transition-colors group">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1"></span>
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Back to site</span>
        </a>
    </div>

    <script type="module">
        import { handleLogin } from './js/admin-auth.js';

        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            const email = emailInput.value;
            const password = passwordInput.value;
            await handleLogin(e, email, password, errorMsg);
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
