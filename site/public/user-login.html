<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iron Pulse - Member Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 255, 0, 0.1);
        }

        input::placeholder {
            color: #6b7280 !important;
            opacity: 0.6 !important;
        }

        input {
            position: relative;
            z-index: 1;
            color: #ffffff;
            caret-color: #D4FF00;
        }

        /* Prevent icon text from overflowing into input */
        .material-symbols-outlined {
            width: 24px;
            height: 24px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4ff00">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body class="bg-[#121212] flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <!-- Decorative Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] left-[-10%] size-[400px] bg-[#D4FF00]/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] size-[400px] bg-[#D4FF00]/5 rounded-full blur-[120px]"></div>
    </div>

    <!-- Top Navigation -->
    <header
        class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between px-6 md:px-10 py-4 bg-background-dark/50 backdrop-blur-md">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="bg-primary p-1.5 rounded-sm flex items-center justify-center">
                <span class="material-symbols-outlined text-background-dark font-bold text-xl">fitness_center</span>
            </div>
            <h2 class="text-slate-100 text-xl font-black tracking-tighter uppercase italic">IRON<span
                    class="text-primary">PULSE</span></h2>
        </a>
        <div class="flex items-center gap-6">
            <!-- Notification Bell -->
            <div id="notiSection" class="relative hidden">
                <button id="notiBtn"
                    class="text-slate-400 hover:text-primary transition-colors flex items-center relative p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                        fill="currentColor">
                        <path
                            d="M160-200v-80h80v-280q0-83 50-147.5T420-792v-28q0-25 17.5-42.5T480-880q25 0 42.5 17.5T540-820v28q80 20 130 84.5T720-560v280h80v80H160Zm320-300Zm0 420q-33 0-56.5-23.5T400-160h160q0 33-23.5 56.5T480-80ZM320-280h320v-280q0-66-47-113t-113-47q-66 0-113 47t-47 113v280Z" />
                    </svg>
                    <span id="notiBadge"
                        class="absolute top-2 right-2 h-2.5 w-2.5 bg-red-500 rounded-full border-2 border-[#121212] hidden"></span>
                </button>

                <!-- Notification Dropdown -->
                <div id="notiDropdown"
                    class="absolute right-0 mt-4 w-72 bg-card-dark border border-white/10 rounded-2xl p-4 shadow-2xl hidden z-[110]">
                    <div class="flex items-center justify-between mb-4 pb-2 border-b border-white/5">
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-500">Notifications</h4>
                        <span id="notiCount"
                            class="text-[10px] bg-primary text-black px-1.5 rounded-sm font-bold">0</span>
                    </div>
                    <div id="notiList" class="space-y-3 max-h-60 overflow-y-auto">
                        <p class="text-xs text-slate-500 text-center py-4">No new notifications</p>
                    </div>
                </div>
            </div>

            <div id="navProfile"
                class="hidden flex items-center gap-3 pl-4 border-l border-white/10 cursor-pointer hover:opacity-80 transition-opacity"
                onclick="openProfileInfo()">
                <div class="text-right hidden sm:block">
                    <p id="navUserName" class="text-sm font-bold leading-none">--</p>
                    <p id="navUserPlan" class="text-[10px] text-primary uppercase font-bold tracking-widest mt-1">--</p>
                </div>
                <div id="navUserAvatar"
                    class="h-10 w-10 rounded-lg bg-primary flex items-center justify-center text-background-dark font-black text-lg border border-white/10">
                    ?
                </div>
            </div>
        </div>
    </header>

    <div class="w-full max-w-md relative z-10">
        <div class="flex flex-col items-center mb-10 text-center">
            <span class="material-symbols-outlined text-[#D4FF00] text-6xl mb-4">fitness_center</span>
            <h1 class="text-3xl font-black tracking-tighter italic uppercase text-white">Member<span
                    class="text-[#D4FF00]">Login</span></h1>
            <p class="text-slate-400 mt-2 font-medium tracking-wide">Enter the elite circle</p>
        </div>

        <div class="glass-card p-8 rounded-2xl border border-white/5 shadow-2xl">
            <form id="memberLoginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 px-1">Email
                        / Username</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#D4FF00] transition-colors">person</span>
                        <input type="text" id="email" placeholder="member@example.com" required
                            class="w-full bg-[#121212]/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:border-[#D4FF00] focus:ring-1 focus:ring-[#D4FF00] outline-none transition-all text-white font-bold" />
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 px-1">Access
                        Code</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#D4FF00] transition-colors">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full bg-[#121212]/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:border-[#D4FF00] focus:ring-1 focus:ring-[#D4FF00] outline-none transition-all text-white font-bold tracking-widest" />
                    </div>
                </div>

                <div id="errorMessage"
                    class="hidden text-red-500 text-xs font-bold bg-red-500/10 p-4 rounded-xl text-center">
                    Invalid credentials
                </div>

                <button type="submit"
                    class="w-full bg-[#D4FF00] text-[#121212] py-4 rounded-xl font-black uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(212,255,0,0.2)]">
                    Login Now
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">
                    Not a member?
                    <a href="index.html#memberships" class="text-[#D4FF00] hover:underline ml-1">Join the Elite</a>
                </p>
            </div>
        </div>

        <a href="index.html"
            class="flex items-center justify-center gap-2 mt-8 text-slate-500 hover:text-white transition-colors group">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1"></span>
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Back to site</span>
        </a>
    </div>

    <!-- Profile Info Modal -->
    <div id="profileModal" class="fixed inset-0 z-[200] hidden">
        <div class="absolute inset-0 bg-background-dark/95 backdrop-blur-md" onclick="closeProfileModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-[#1e1e1e] w-full max-w-md rounded-2xl p-8 border border-white/10 relative">
                <button onclick="closeProfileModal()"
                    class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <div class="flex items-center gap-4 mb-6">
                    <div id="profileInitial"
                        class="h-14 w-14 rounded-lg bg-primary flex items-center justify-center text-background-dark font-black text-2xl">
                        ?
                    </div>
                    <div>
                        <h3 id="profileName" class="text-xl font-black italic uppercase">--</h3>
                        <p id="profileEmail" class="text-slate-400 text-xs font-medium">--</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-4 bg-[#121212] rounded-xl border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">card_membership</span>
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Plan</span>
                        </div>
                        <span id="profilePlan" class="text-sm font-bold text-primary">--</span>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-[#121212] rounded-xl border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">verified</span>
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Status</span>
                        </div>
                        <span id="profileStatus" class="text-sm font-bold uppercase">--</span>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-[#121212] rounded-xl border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">event_available</span>
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Join Date</span>
                        </div>
                        <span id="profileJoined" class="text-sm font-bold">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { handleMemberLogin } from './js/user-auth.js';

        const form = document.getElementById('memberLoginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            await handleMemberLogin(e, emailInput.value, passwordInput.value, errorMsg);
        });

        // Profile logic
        let memberProfileData = null;

        async function loadMemberProfile() {
            try {
                const response = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    memberProfileData = user;

                    document.getElementById('navProfile').classList.remove('hidden');
                    document.getElementById('notiSection').classList.remove('hidden');
                    document.getElementById('navUserName').textContent = user.name;
                    document.getElementById('navUserPlan').textContent = user.planName || 'No Active Plan';
                    document.getElementById('navUserAvatar').textContent = user.name.charAt(0).toUpperCase();

                    checkNotifications(user);
                }
            } catch (err) {
                console.error('Error loading profile:', err);
            }
        }

        // Notification Logic
        const notiBtn = document.getElementById('notiBtn');
        const notiDropdown = document.getElementById('notiDropdown');
        const notiList = document.getElementById('notiList');
        const notiBadge = document.getElementById('notiBadge');
        const notiCount = document.getElementById('notiCount');

        if (notiBtn) {
            notiBtn.onclick = (e) => {
                e.stopPropagation();
                notiDropdown.classList.toggle('hidden');
            };
        }

        document.addEventListener('click', () => notiDropdown?.classList.add('hidden'));
        if (notiDropdown) notiDropdown.onclick = (e) => e.stopPropagation();

        function checkNotifications(user) {
            const notifications = [];

            if (user.membershipStatus === 'active' && user.expiryDate) {
                const now = new Date();
                const expiry = new Date(user.expiryDate);
                const diffTime = expiry - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 10 && diffDays > 0) {
                    notifications.push({
                        title: 'Plan Expiring Soon',
                        message: `Your plan expires in ${diffDays} day${diffDays > 1 ? 's' : ''}. Please renew to avoid interruption!`,
                        type: 'warning'
                    });
                } else if (diffDays <= 0) {
                    notifications.push({
                        title: 'Plan Expired',
                        message: `Your plan has expired. Please choose a new plan to continue.`,
                        type: 'danger'
                    });
                }
            } else if (user.membershipStatus === 'expired') {
                notifications.push({
                    title: 'Plan Expired',
                    message: `Your plan has expired. Please choose a new plan to continue.`,
                    type: 'danger'
                });
            }

            if (notifications.length > 0 && notiBadge && notiCount && notiList) {
                notiBadge.classList.remove('hidden');
                notiCount.textContent = notifications.length;
                notiList.innerHTML = notifications.map(n => `
                    <div class="p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="material-symbols-outlined text-sm ${n.type === 'danger' ? 'text-red-500' : 'text-primary'}">
                                ${n.type === 'danger' ? 'error' : 'warning'}
                            </span>
                            <h5 class="text-[10px] font-black uppercase tracking-widest">${n.title}</h5>
                        </div>
                        <p class="text-[11px] text-slate-400 leading-relaxed font-medium">${n.message}</p>
                    </div>
                `).join('');
            } else if (notiBadge && notiCount && notiList) {
                notiBadge.classList.add('hidden');
                notiCount.textContent = '0';
                notiList.innerHTML = '<p class="text-xs text-slate-500 text-center py-4">No new notifications</p>';
            }
        }

        window.openProfileInfo = () => {
            if (!memberProfileData) return;
            const u = memberProfileData;
            document.getElementById('profileInitial').textContent = u.name.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = u.name;
            document.getElementById('profileEmail').textContent = u.email || '--';
            document.getElementById('profilePlan').textContent = u.planName || '--';

            const statusEl = document.getElementById('profileStatus');
            statusEl.textContent = u.membershipStatus || '--';
            statusEl.className = `text-sm font-bold uppercase ${u.membershipStatus === 'active' ? 'text-green-400' : 'text-orange-400'}`;

            if (u.joinedDate) {
                const joined = new Date(u.joinedDate);
                document.getElementById('profileJoined').textContent = joined.toLocaleDateString();
            } else {
                document.getElementById('profileJoined').textContent = '--';
            }

            document.getElementById('profileModal').classList.remove('hidden');
        };

        window.closeProfileModal = () => {
            document.getElementById('profileModal').classList.add('hidden');
        };

        loadMemberProfile();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
